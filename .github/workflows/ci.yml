name: CI

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install GTest
      run: |
        sudo apt update
        sudo apt install -y libgtest-dev cmake build-essential
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib
    
    - name: Configure CMake with tests
      run: cmake -H. -B_build -DBUILD_TESTS=ON
    
    - name: Build
      run: cmake --build _build
    
    - name: Run GTest tests
      run: ./_build/tests

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt install -y cmake build-essential
    
    - name: Configure CMake
      run: cmake -H. -B_build
    
    - name: Build
      run: cmake --build _build
    
    - name: Create DEB package
      run: |
        cd _build
        cpack -G DEB
        cd ..
    
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: _build/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
